<svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <!-- White background circle -->
  <circle cx="36" cy="36" r="36" fill="white"/>

  <!-- Dark monochrome circle border for badge -->
  <circle cx="36" cy="36" r="34" fill="none" stroke="#1f2937" stroke-width="2"/>

  <!-- Dog head silhouette - monochrome dark -->
  <!-- Left ear -->
  <ellipse cx="22" cy="18" rx="7" ry="11" fill="#1f2937" transform="rotate(-30 22 18)"/>

  <!-- Right ear -->
  <ellipse cx="50" cy="18" rx="7" ry="11" fill="#1f2937" transform="rotate(30 50 18)"/>

  <!-- Head -->
  <circle cx="36" cy="36" r="19" fill="#1f2937"/>

  <!-- Snout -->
  <ellipse cx="36" cy="48" rx="12" ry="10" fill="#1f2937"/>

  <!-- Left eye -->
  <circle cx="30" cy="32" r="2.5" fill="white"/>

  <!-- Right eye -->
  <circle cx="42" cy="32" r="2.5" fill="white"/>

  <!-- Nose -->
  <ellipse cx="36" cy="47" rx="3" ry="3.5" fill="white"/>
</svg>
