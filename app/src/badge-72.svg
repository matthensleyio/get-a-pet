<svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark solid background for push notification badge (monochrome-friendly) -->
  <rect width="72" height="72" fill="#1A3A0E"/>

  <!-- Left ear -->
  <ellipse cx="20" cy="37" rx="10" ry="16" fill="#5A3518" transform="rotate(-18 20 37)"/>
  <!-- Right ear -->
  <ellipse cx="52" cy="37" rx="10" ry="16" fill="#5A3518" transform="rotate(18 52 37)"/>

  <!-- Head -->
  <ellipse cx="36" cy="41" rx="22" ry="21" fill="#C8874A"/>

  <!-- Forehead -->
  <ellipse cx="36" cy="32" rx="15" ry="12" fill="#DDA870"/>

  <!-- Muzzle -->
  <ellipse cx="36" cy="49" rx="13" ry="11" fill="#DDA870"/>

  <!-- Left eye -->
  <ellipse cx="28" cy="37" rx="5" ry="5.5" fill="white"/>
  <circle cx="28" cy="37" r="3.5" fill="#1A0C06"/>
  <circle cx="29.5" cy="35.5" r="1.2" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="44" cy="37" rx="5" ry="5.5" fill="white"/>
  <circle cx="44" cy="37" r="3.5" fill="#1A0C06"/>
  <circle cx="45.5" cy="35.5" r="1.2" fill="white"/>

  <!-- Nose -->
  <ellipse cx="36" cy="45" rx="4.5" ry="3.5" fill="#1E100A"/>

  <!-- Mouth -->
  <path d="M 31 50 Q 36 55 41 50" fill="none" stroke="#1E100A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="36" cy="54" rx="3.5" ry="3" fill="#E8617A"/>
</svg>
