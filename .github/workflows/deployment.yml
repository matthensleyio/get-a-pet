name: Azure Static Web App Deployment

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    environment: Production
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Stamp build version
        run: |
          SHORT="${GITHUB_SHA:0:8}"
          sed -i "s/get-a-pet-v[0-9]*/get-a-pet-${SHORT}/g" app/src/sw.js
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.KHS_DOG_MONITOR_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "app/src"
          api_location: "app/api"
          output_location: ""
